timezone: Etc/UTC
cloudreve:
  db_password: "supersecretpassword"
  redis_password: "supersecretpassword"
network:
  web_port:
    bind_mode: published
    port: 9080
  aria2_port:
    bind_mode: published
    port: 9088
storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
